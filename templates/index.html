<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trade Panel</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.al { color:#22c55e; }
.sat { color:#ef4444; }
</style>

</head>

<body>

<h1>📊 CANLI TRADE PANEL</h1>

<table border="1" width="100%">
<tr>
<th>Hisse</th>
<th>Fiyat</th>
<th>Trend</th>
<th>AI</th>
<th>Skor</th>
</tr>

<tbody id="table"></tbody>

</table>

<script>

async function load() {
    const res = await fetch("/scan");
    const data = await res.json();

    let html = "";

    data.results.forEach(r => {
        html += `
        <tr>
            <td>${r.symbol}</td>
            <td>${r.price.toFixed(2)}</td>
            <td>${r.trend}</td>
            <td class="${r.ml === 'AL' ? 'al' : 'sat'}">${r.ml}</td>
            <td>${r.score}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;

    // 🔔 ALERT
    if (data.alerts.length > 0) {
        alert("🚀 Yeni fırsat bulundu!");
    }
}

setInterval(load, 15000);
load();

</script>

</body>
</html>
